name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            build-command: npm run tauri:build:windows
            asset-glob: src-tauri/target/release/bundle/nsis/*.exe
            asset-suffix: x64-setup.exe
          - platform: macos-14
            build-command: npm run tauri:build:macos
            asset-glob: src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
            asset-suffix: aarch64.dmg

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Install macOS target
        if: matrix.platform == 'macos-14'
        run: rustup target add aarch64-apple-darwin

      - name: Build installer
        run: ${{ matrix.build-command }}

      - name: Prepare release asset
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          mkdir -p release-assets
          matches=(${{ matrix.asset-glob }})
          if [ "${#matches[@]}" -ne 1 ]; then
            printf 'Expected one asset for %s, found %s\n' "${{ matrix.asset-glob }}" "${#matches[@]}"
            printf '%s\n' "${matches[@]}"
            exit 1
          fi
          version="${GITHUB_REF_NAME#v}"
          asset_name="codex-manager_${version}_${{ matrix.asset-suffix }}"
          cp "${matches[0]}" "release-assets/${asset_name}"
          printf 'ASSET_PATH=release-assets/%s\n' "${asset_name}" >> "${GITHUB_ENV}"

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release create "${GITHUB_REF_NAME}" \
              --title "Codex Manager ${GITHUB_REF_NAME}" \
              --notes "See the assets to download and install this version." || \
              gh release view "${GITHUB_REF_NAME}" >/dev/null
          fi

      - name: Upload installer
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${GITHUB_REF_NAME}" "${ASSET_PATH}" --clobber
